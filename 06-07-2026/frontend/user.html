<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Panel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>User Panel</h1>
      <button id="logoutBtn">Logout</button>
    </header>

    <section class="stats-grid">
      <div class="stat-card"><h3>Total Students</h3><p id="studentCount">0</p></div>
      <div class="stat-card"><h3>Access</h3><p>View only</p></div>
      <div class="stat-card"><h3>View Modes</h3><p>Table and card</p></div>
      <div class="stat-card"><h3>Role</h3><p>User</p></div>
    </section>

    <section class="card list-card">
      <div class="toolbar">
        <h2>Students</h2>
        <div>
          <button id="tableViewBtn" class="active">Table View</button>
          <button id="cardViewBtn">Card View</button>
        </div>
      </div>
      <div id="studentTable"></div>
    </section>
  </div>

  <script src="user.js"></script>
</body>
</html>
